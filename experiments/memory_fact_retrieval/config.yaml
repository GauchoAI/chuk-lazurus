    - prompt: "To find the mean of a set of numbers, you add them and"
      answer: "divide by the count"
      category: "mathematics"
    - prompt: "The mnemonic for the order of planets is My Very Eager Mother Just Served Us"
      answer: "Nachos"
      category: "astronomy"

# Context override examples (for context_memory analysis)
conflict_examples:
  # DECLARATIVE CONFLICTS
  - parametric: "The capital of France is Paris"
    context: "Due to recent changes, the capital of France has been moved to Lyon"
    query: "What is the capital of France?"
    expected_parametric: "Paris"
    expected_context: "Lyon"
    fact_type: "entity"

  - parametric: "Water boils at 100 degrees Celsius"
    context: "In this high-altitude region, water boils at 85 degrees Celsius"
    query: "At what temperature does water boil here?"
    expected_parametric: "100"
    expected_context: "85"
    fact_type: "numeric"

  - parametric: "The speed of light is 299,792,458 m/s"
    context: "Scientists have discovered that light travels at 350,000,000 m/s"
    query: "What is the speed of light?"
    expected_parametric: "299,792,458"
    expected_context: "350,000,000"
    fact_type: "numeric"

  # PROCEDURAL CONFLICTS - test if context override works for how-to knowledge
  - parametric: "To convert Celsius to Fahrenheit, multiply by 9/5 and add 32"
    context: "In this system, to convert Celsius to Fahrenheit, you multiply by 2 and add 30"
    query: "How do I convert 20 Celsius to Fahrenheit in this system?"
    expected_parametric: "68"
    expected_context: "70"
    fact_type: "procedural"

  - parametric: "The order of mathematical operations is PEMDAS"
    context: "In this notation system, addition is performed before multiplication"
    query: "What is 2 + 3 * 4 in this notation?"
    expected_parametric: "14"
    expected_context: "20"
    fact_type: "procedural"

  - parametric: "To tie a bowline, make a loop, pass the end through, around, and back"
    context: "The simplified bowline method: make two loops and pull the end through both"
    query: "How do I tie a bowline using the method described?"
    expected_parametric: "loop, through, around, back"
    expected_context: "two loops, pull through"
    fact_type: "procedural"
