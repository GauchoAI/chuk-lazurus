# Memory & Fact Retrieval Experiment Configuration

# GPT-OSS 20B - MoE model with 24 layers
model: "openai/gpt-oss-20b"

analyses:
  - parametric_probing
  - context_memory
  - fact_steering
  - retrieval_attention
  - fact_types
  - confidence
  - moe_fact_routing

# Parametric memory probing configuration
# GPT-OSS has 24 layers - test at 25%, 50%, 75% depth and key layers
parametric_probing:
  probe_layers: [4, 6, 8, 10, 12, 13, 16, 18, 20]  # L13 = vocab classifier layer
  num_facts_per_type: 50
  train_split: 0.8
  probe_type: "linear"  # linear, mlp
  epochs: 100
  learning_rate: 0.001

# Context vs memory discrimination
context_memory:
  num_conflict_examples: 30
  override_strengths: [0.5, 1.0, 2.0, 5.0]  # How strongly context asserts
  probe_layers: [4, 8, 12, 13, 16, 20]  # Include L13 for vocab alignment
  tracking_positions: ["context", "query", "answer"]

# Fact manipulation via steering
fact_steering:
  steering_layers: [8, 10, 12, 13, 16]  # L12-13 are key for GPT-OSS
  steering_strengths: [1.0, 2.0, 3.0, 5.0, 8.0]
  num_test_facts: 20
  extraction_method: "pca"  # pca, difference, mean_diff

# Retrieval attention dynamics
retrieval_attention:
  track_layers: [0, 4, 8, 12, 13, 16, 20]
  num_heads_to_analyze: 32
  attention_threshold: 0.1  # Minimum attention weight to consider
  categories: ["known", "unknown", "hallucinated"]

# Fact type specialization
fact_types:
  types: ["entity", "numeric", "temporal", "procedural"]
  num_examples_per_type: 40
  probe_layers: [4, 8, 12, 13]  # Include L13 for vocab-aligned analysis
  classifier_type: "linear"

# Confidence calibration
confidence:
  probe_layer: 13  # L13 is key layer for GPT-OSS
  num_correct_examples: 50
  num_incorrect_examples: 50
  calibration_bins: 10

# MoE Expert Routing Analysis
moe_fact_routing:
  track_layers: [4, 8, 12, 13, 16, 20]
  min_activation_threshold: 0.1  # Minimum weight to count as activation
  dominant_threshold: 0.2  # Threshold for "dominant" expert designation

# Fact datasets
